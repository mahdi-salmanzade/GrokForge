name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  msrv:
    name: minimum Rust 1.88
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked --workspace --all-targets

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --locked --workspace
        env:
          INSTA_UPDATE: "no"

  deny:
    name: cargo-deny (license + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Run the sandbox crate separately on real platform kernels. Backend enforcement is mandatory;
  # Ubuntu 24.04 receives a narrow AppArmor rule for the pinned Bubblewrap executable.
  sandbox:
    name: sandbox smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      GROKFORGE_REQUIRE_SANDBOX: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install supported bubblewrap
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y apparmor build-essential meson ninja-build pkg-config libcap-dev libselinux1-dev
          git clone --depth 1 --branch v0.11.2 https://github.com/containers/bubblewrap.git /tmp/bubblewrap
          test "$(git -C /tmp/bubblewrap rev-parse HEAD)" = "1b80120ef26a28e065e67f89bfef873f13bdd317"
          meson setup /tmp/bubblewrap/build /tmp/bubblewrap --prefix=/usr
          meson compile -C /tmp/bubblewrap/build
          sudo meson install -C /tmp/bubblewrap/build
          /usr/bin/bwrap --version
          if test -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns && test "$(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns)" = 1; then
            sudo tee /etc/apparmor.d/grokforge-bwrap >/dev/null <<'EOF'
          abi <abi/4.0>,
          include <tunables/global>

          /usr/bin/bwrap flags=(unconfined) {
            userns,
          }
          EOF
            sudo apparmor_parser -r /etc/apparmor.d/grokforge-bwrap
          fi
          /usr/bin/bwrap --ro-bind / / --dev /dev --proc /proc --unshare-net --unshare-pid --unshare-ipc --unshare-uts --new-session --die-with-parent --cap-drop ALL -- /bin/true
      - run: cargo test --locked -p grokforge-sandbox
