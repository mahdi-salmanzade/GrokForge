# cargo-deny — dependency license and advisory policy
# and keeps copyleft/Fair-Source deps out of the tree.

[graph]
all-features = true

[licenses]
version = 2
# Only permissive dependency licenses that are compatible with this MIT project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    # Mozilla's CA certificate data, pulled by rustls/webpki-roots. This permissive data license
    # does not impose copyleft terms on GrokForge's source or binaries.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
# Explicitly deny the families we never want (GPL copyleft, Fair Source).
# Anything not in `allow` already fails; this documents intent.

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
version = 2
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
